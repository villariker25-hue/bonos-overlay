<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Overlay bonos</title>
<style>
  /* ── Ajustes rápidos ─────────────────────────────────────────────
     Por URL: ?v=45 (velocidad px/s)  ?total=0 (ocultar contador)
              ?bg=1 (pintar fondo morado como la maqueta; por defecto
              el fondo es transparente para que se vea el stream) */
  :root{
    --ancho: 480px;
    /* Colores oficiales: degradado #B377FF → #7133F4, fondo #11091E */
    --morado: #B377FF;
    --morado-oscuro: #7133F4;
    --degradado: linear-gradient(180deg, #B377FF, #7133F4);
    --fondo-tarjeta: rgba(17, 9, 30, .72);
    --borde: rgba(179, 119, 255, .35);
  }

  html, body{
    margin: 0; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
  }
  body.con-fondo{
    background: linear-gradient(180deg, #392066 0%, #241243 55%, #170b30 100%);
  }
  #app{
    width: var(--ancho);
    height: 100vh;
    margin: 0 auto;
    padding: 10px 6px 14px;
    box-sizing: border-box;
    display: flex; flex-direction: column;
  }

  /* Título BONOS estilo maqueta: serif grande con brillo */
  #titulo{
    text-align: center;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 42px; font-weight: 700; letter-spacing: 3px;
    color: #fff;
    text-shadow:
      0 0 14px rgba(179, 119, 255, .55),
      -2px 0 6px rgba(255, 90, 200, .28),
       2px 0 6px rgba(90, 190, 255, .28);
    margin: 0 0 4px;
  }
  #contador{
    text-align: center;
    font-size: 14px; font-weight: 600;
    color: #e6dcff;
    margin-bottom: 8px;
  }
  #contador b{ color: var(--morado); }
  #separador{
    height: 1px; border: 0;
    background: linear-gradient(90deg, transparent, rgba(179,119,255,.55), transparent);
    margin: 0 6px 14px;
  }

  /* Marco de la maqueta: recuadro redondeado con borde discontinuo */
  #marco{
    flex: 1 1 auto;
    min-height: 0;
    border: 2px dashed rgba(196, 160, 255, .45);
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(179,119,255,.07), rgba(113,51,244,.10));
    padding: 12px 10px;
    display: flex;
    overflow: hidden;
  }

  /* Zona que gira, con desvanecido arriba y abajo */
  #zona{
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(transparent, #000 7%, #000 93%, transparent);
            mask-image: linear-gradient(transparent, #000 7%, #000 93%, transparent);
  }
  #cinta{
    display: flex; flex-direction: column; gap: 10px;
    padding: 8px 0;
    will-change: transform;
  }
  /* Cada "juego" es la lista completa en 2 columnas: suben de dos en dos */
  .juego{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .bono{
    padding: 9px 12px 9px 15px;
    border-radius: 10px;
    /* Franja lateral con el degradado oficial sobre fondo #11091E translúcido */
    background-color: var(--fondo-tarjeta);
    background-image: var(--degradado);
    background-size: 4px 100%;
    background-repeat: no-repeat;
    border: 1px solid var(--borde);
    min-width: 0;
  }
  .bono .nombre{
    display: block;
    color: #f5f3ff; font-size: 16px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 3px rgba(0,0,0,.7);
  }
  .bono .tipo{
    display: block; margin-top: 1px;
    color: rgba(179, 119, 255, .85); font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 1px 3px rgba(0,0,0,.7);
  }
  .bono .precio{
    display: block; margin-top: 2px;
    color: var(--morado); font-size: 15px; font-weight: 700;
    text-shadow: 0 1px 3px rgba(0,0,0,.7);
  }
</style>
</head>
<body>
<div id="app" style="display:none">
  <div id="titulo">BONOS</div>
  <div id="contador"><b id="num">0</b> · <b id="total">0€</b></div>
  <hr id="separador">
  <div id="marco">
    <div id="zona"><div id="cinta"></div></div>
  </div>
</div>

<script>
const params    = new URLSearchParams(location.search);
const VELOCIDAD = parseFloat(params.get("v")) || 35;   // px por segundo
const VER_TOTAL = params.get("total") !== "0";
const GAP       = 10;
if (params.get("bg") === "1") document.body.classList.add("con-fondo");

const app      = document.getElementById("app");
const contador = document.getElementById("contador");
const zona     = document.getElementById("zona");
const cinta    = document.getElementById("cinta");
let ultimoJson = "";
let animacion  = null;

function extraerImporte(texto){
  const m = String(texto).replace(",", ".").match(/\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : 0;
}

function juego(bonos){
  const div = document.createElement("div");
  div.className = "juego";
  for (const b of bonos){
    const t = document.createElement("div");
    t.className = "bono";
    // "Slot — Tipo de bono" se parte en dos líneas
    const sep = b.nombre.indexOf(" — ");
    const principal = sep === -1 ? b.nombre : b.nombre.slice(0, sep);
    const variante  = sep === -1 ? null : b.nombre.slice(sep + 3);
    const nombre = document.createElement("span");
    nombre.className = "nombre";
    nombre.textContent = principal;
    t.appendChild(nombre);
    if (variante){
      const tipo = document.createElement("span");
      tipo.className = "tipo";
      tipo.textContent = variante;
      t.appendChild(tipo);
    }
    const precio = document.createElement("span");
    precio.className = "precio";
    precio.textContent = b.precio || "";
    t.appendChild(precio);
    div.appendChild(t);
  }
  return div;
}

function reconstruir(bonos){
  if (animacion) { animacion.cancel(); animacion = null; }
  cinta.innerHTML = "";

  app.style.display = bonos.length ? "flex" : "none";
  if (!bonos.length) return;

  contador.style.display = VER_TOTAL ? "block" : "none";
  if (VER_TOTAL){
    document.getElementById("num").textContent = bonos.length;
    const total = bonos.reduce((suma, b) => suma + extraerImporte(b.precio), 0);
    document.getElementById("total").textContent =
      (Math.round(total * 100) / 100) + "€";
  }

  // Un juego para medir su altura real
  const primero = juego(bonos);
  cinta.appendChild(primero);
  const alturaJuego = primero.offsetHeight;

  // Repetir hasta cubrir el doble de la pantalla (bucle sin huecos)
  const copias = Math.max(2, Math.ceil((zona.clientHeight * 2) / alturaJuego) + 1);
  for (let i = 1; i < copias; i++) cinta.appendChild(juego(bonos));

  // Desplazar exactamente un juego y repetir: bucle infinito hacia arriba
  const desplazamiento = alturaJuego + GAP;
  animacion = cinta.animate(
    [{ transform: "translateY(0)" }, { transform: `translateY(-${desplazamiento}px)` }],
    { duration: (desplazamiento / VELOCIDAD) * 1000, iterations: Infinity, easing: "linear" }
  );
}

// ── Firebase (misma base que la app de gastos, apartado propio) ──
const API_KEY = "AIzaSyDdB36I8wdRiHkBwOi-HqMnCd_CRBd2NAI";
const DB   = "https://gastos-casa-2b557-default-rtdb.europe-west1.firebasedatabase.app";
const RUTA = "hogares/bonos-overlay-ik3v7q/bonos";

async function tokenFirebase(){
  const guardado = JSON.parse(localStorage.getItem("tokenBonos") || "null");
  if (guardado && Date.now() < guardado.caduca) return guardado.token;
  const a = await (await fetch(
    "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=" + API_KEY,
    { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" }
  )).json();
  const nuevo = { token: a.idToken,
                  caduca: Date.now() + (parseInt(a.expiresIn || "3600", 10) - 300) * 1000 };
  localStorage.setItem("tokenBonos", JSON.stringify(nuevo));
  return nuevo.token;
}

async function nube(reintento = false){
  const t = await tokenFirebase();
  const r = await fetch(`${DB}/${RUTA}.json?auth=${t}`);
  if (r.status === 401 && !reintento){
    localStorage.removeItem("tokenBonos");     // token caducado: renovar una vez
    return nube(true);
  }
  return r.json();
}

function aLista(obj){
  return Object.entries(obj || {})
    .map(([id, b]) => ({ id, ...b }))
    .sort((x, y) => (x.t || 0) - (y.t || 0));
}

async function refrescar(){
  try{
    const bonos = aLista(await nube());
    const json = JSON.stringify(bonos);
    if (json !== ultimoJson){
      ultimoJson = json;
      reconstruir(bonos);
    }
  }catch(e){ /* sin conexión: reintentar en el siguiente ciclo */ }
}

refrescar();
setInterval(refrescar, 2000);

// Si cambia el tamaño de la ventana (o de la fuente en OBS), reconstruir
let temporizadorResize = null;
window.addEventListener("resize", () => {
  clearTimeout(temporizadorResize);
  temporizadorResize = setTimeout(() => { ultimoJson = ""; refrescar(); }, 200);
});
</script>
</body>
</html>
