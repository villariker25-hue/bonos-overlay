<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Promo casino</title>
<style>
  /* ── Configurable por URL ────────────────────────────────────────
     ?casino=SPINANIA  ?premio=100€  ?deposito=10€
     ?donde=enlace en el chat                                        */
  html, body{
    margin: 0; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }

  #cartel{
    position: relative;
    width: 600px;
    box-sizing: border-box;
    padding: 26px 30px 20px;
    border-radius: 26px;
    background: linear-gradient(160deg, #3b1a63 0%, #241243 60%, #170b30 100%);
    border: 2px solid rgba(255, 190, 90, .65);
    box-shadow:
      0 0 26px rgba(255, 160, 60, .28),
      inset 0 0 40px rgba(179, 119, 255, .12);
    text-align: center;
    overflow: hidden;
  }

  /* Brillo que barre el cartel */
  #cartel::after{
    content: "";
    position: absolute; top: -50%; left: -70%;
    width: 40%; height: 200%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,.14), transparent);
    transform: rotate(8deg);
    animation: barrido 4.5s ease-in-out infinite;
  }
  @keyframes barrido{
    0%, 55%{ left: -70%; }
    85%, 100%{ left: 140%; }
  }

  .caramelo{
    position: absolute;
    font-size: 40px;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,.5));
    animation: flotar 3.2s ease-in-out infinite;
  }
  .caramelo.c1{ top: 8px;  left: 14px;  animation-delay: 0s;   transform: rotate(-18deg); }
  .caramelo.c2{ top: 8px;  right: 14px; animation-delay: 1.1s; transform: rotate(16deg); }
  .caramelo.c3{ bottom: 6px; left: 40px; animation-delay: .6s; transform: rotate(10deg); font-size: 30px; }
  .caramelo.c4{ bottom: 6px; right: 40px; animation-delay: 1.7s; transform: rotate(-12deg); font-size: 30px; }
  @keyframes flotar{
    0%, 100%{ translate: 0 0; }
    50%{ translate: 0 -7px; }
  }

  #nombre{
    font-size: 54px; font-weight: 900; letter-spacing: 2px;
    font-family: "Arial Black", "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #ffe66b 15%, #ffb13d 55%, #ff7a2f 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    transform: rotate(-2deg);
    margin: 0 0 6px;
    filter: drop-shadow(0 3px 0 #7a2f00) drop-shadow(0 6px 10px rgba(0,0,0,.55));
  }

  #sorteo{
    display: inline-block;
    margin: 4px 0 12px;
    padding: 10px 26px;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff5d6e, #d9203b);
    border: 2px solid #ffd9a0;
    color: #fff;
    font-size: 30px; font-weight: 800; letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,.45);
    box-shadow: 0 4px 16px rgba(217, 32, 59, .5);
    animation: latido 1.6s ease-in-out infinite;
  }
  #sorteo b{ font-size: 36px; color: #ffe66b; }
  @keyframes latido{
    0%, 100%{ scale: 1; }
    50%{ scale: 1.055; }
  }

  #condicion{
    font-size: 21px; font-weight: 600; color: #f5f3ff;
    text-shadow: 0 2px 5px rgba(0,0,0,.6);
    margin: 0 0 6px;
  }
  #condicion b{ color: #B377FF; }
  #donde{
    font-size: 17px; font-weight: 700; color: #ffd9a0;
    text-shadow: 0 2px 5px rgba(0,0,0,.6);
    margin: 0 0 10px;
  }
  #legal{
    font-size: 11px; color: rgba(230, 220, 255, .55);
    letter-spacing: .5px;
  }
</style>
</head>
<body>
<div id="cartel">
  <span class="caramelo c1">🍭</span>
  <span class="caramelo c2">🍭</span>
  <span class="caramelo c3">🍬</span>
  <span class="caramelo c4">🍬</span>
  <h1 id="nombre">SPINANIA</h1>
  <div id="sorteo">SORTEO DE <b>100€</b> HOY</div>
  <p id="condicion">Deposita <b>10€</b> desde mi enlace y participas</p>
  <p id="donde">👉 Enlace en el chat</p>
  <p id="legal">+18 · Juega con responsabilidad</p>
</div>

<script>
const params = new URLSearchParams(location.search);
const pon = (id, texto) => { if (texto) document.getElementById(id).textContent = texto; };
pon("nombre", params.get("casino"));
if (params.get("premio")){
  document.getElementById("sorteo").innerHTML =
    "SORTEO DE <b></b> HOY";
  document.querySelector("#sorteo b").textContent = params.get("premio");
}
if (params.get("deposito")){
  document.getElementById("condicion").innerHTML =
    "Deposita <b></b> desde mi enlace y participas";
  document.querySelector("#condicion b").textContent = params.get("deposito");
}
if (params.get("donde")) pon("donde", "👉 " + params.get("donde"));
</script>
</body>
</html>
