<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Promo casino</title>
<style>
  /* ── Configurable por URL ────────────────────────────────────────
     ?casino=SPINANIA  ?premio=100€  ?deposito=10€
     ?donde=enlace en el chat                                        */
  html, body{
    margin: 0; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }

  /* Tira apaisada */
  #cartel{
    position: relative;
    width: 960px;
    box-sizing: border-box;
    padding: 16px 34px 26px;
    border-radius: 20px;
    background: linear-gradient(160deg, #3b1a63 0%, #241243 60%, #170b30 100%);
    border: 2px solid rgba(255, 190, 90, .65);
    box-shadow:
      0 0 26px rgba(255, 160, 60, .28),
      inset 0 0 40px rgba(179, 119, 255, .12);
    overflow: hidden;
    display: flex; align-items: center; gap: 28px;
  }

  /* Brillo que barre el cartel */
  #cartel::after{
    content: "";
    position: absolute; top: -50%; left: -40%;
    width: 22%; height: 200%;
    background: linear-gradient(105deg, transparent, rgba(255,255,255,.14), transparent);
    transform: rotate(8deg);
    animation: barrido 4.5s ease-in-out infinite;
  }
  @keyframes barrido{
    0%, 55%{ left: -40%; }
    85%, 100%{ left: 130%; }
  }

  .caramelo{
    font-size: 34px;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,.5));
    animation: flotar 3.2s ease-in-out infinite;
  }
  .caramelo.c1{ transform: rotate(-16deg); animation-delay: 0s; }
  .caramelo.c2{ transform: rotate(14deg);  animation-delay: 1.2s; }
  @keyframes flotar{
    0%, 100%{ translate: 0 0; }
    50%{ translate: 0 -6px; }
  }

  #nombre{
    font-size: 42px; font-weight: 900; letter-spacing: 1px;
    font-family: "Arial Black", "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #ffe66b 15%, #ffb13d 55%, #ff7a2f 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    transform: rotate(-2deg);
    margin: 0;
    white-space: nowrap;
    filter: drop-shadow(0 2px 0 #7a2f00) drop-shadow(0 5px 8px rgba(0,0,0,.55));
  }

  #sorteo{
    flex-shrink: 0;
    padding: 9px 22px;
    border-radius: 999px;
    background: linear-gradient(180deg, #ff5d6e, #d9203b);
    border: 2px solid #ffd9a0;
    color: #fff;
    font-size: 22px; font-weight: 800; letter-spacing: .5px;
    white-space: nowrap;
    text-shadow: 0 2px 4px rgba(0,0,0,.45);
    box-shadow: 0 4px 16px rgba(217, 32, 59, .5);
    animation: latido 1.6s ease-in-out infinite;
  }
  #sorteo b{ font-size: 27px; color: #ffe66b; }
  @keyframes latido{
    0%, 100%{ scale: 1; }
    50%{ scale: 1.05; }
  }

  #textos{ min-width: 0; }
  #condicion{
    font-size: 19px; font-weight: 600; color: #f5f3ff;
    text-shadow: 0 2px 5px rgba(0,0,0,.6);
    margin: 0 0 2px;
    white-space: nowrap;
  }
  #condicion b{ color: #B377FF; }
  #donde{
    font-size: 15px; font-weight: 700; color: #ffd9a0;
    text-shadow: 0 2px 5px rgba(0,0,0,.6);
    margin: 0;
  }

  /* Letra pequeña en una sola línea abajo del todo */
  #letra-pequena{
    position: absolute; left: 0; right: 0; bottom: 5px;
    text-align: center;
    font-size: 11px; color: rgba(230, 220, 255, .6);
    letter-spacing: .4px;
  }
  #letra-pequena .condiciones{ color: rgba(255, 217, 160, .8); font-weight: 600; }
</style>
</head>
<body>
<div id="cartel">
  <span class="caramelo c1">🍭</span>
  <h1 id="nombre">SPINANIA</h1>
  <div id="sorteo">SORTEO DE <b>100€</b> HOY</div>
  <div id="textos">
    <p id="condicion">Deposita <b>10€</b> desde mi enlace y participas</p>
    <p id="donde">👉 Enlace en el chat</p>
  </div>
  <span class="caramelo c2">🍭</span>
  <div id="letra-pequena">
    <span class="condiciones">* El sorteo se realizará al completar el wager</span>
    &nbsp;·&nbsp; +18 · Juega con responsabilidad
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const pon = (id, texto) => { if (texto) document.getElementById(id).textContent = texto; };
pon("nombre", params.get("casino"));
if (params.get("premio")){
  document.getElementById("sorteo").innerHTML =
    "SORTEO DE <b></b> HOY";
  document.querySelector("#sorteo b").textContent = params.get("premio");
}
if (params.get("deposito")){
  document.getElementById("condicion").innerHTML =
    "Deposita <b></b> desde mi enlace y participas";
  document.querySelector("#condicion b").textContent = params.get("deposito");
}
if (params.get("donde")) pon("donde", "👉 " + params.get("donde"));
</script>
</body>
</html>
